[env:pico_w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200

; BLE GATT skeleton is disabled by default so Serial mock builds remain simple.
; To experiment with arduino-pico Bluetooth support, also enable the framework
; Bluetooth stack:
; build_flags =
;   -DPIO_FRAMEWORK_ARDUINO_ENABLE_BLUETOOTH
;   -DROVER_ENABLE_BLE_GATT
