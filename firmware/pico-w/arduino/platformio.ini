[platformio]
default_envs = pico_w_serial_mock

[env:pico_w_serial_mock]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200

; Default build: Serial mock transport, BLE GATT disabled.
; ROVER_ENABLE_BLE_GATT is intentionally not defined here.
build_flags =
  -DROVER_PLATFORMIO_BUILD

[env:pico_w_ble_experimental]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200

; Experimental build: enables arduino-pico Bluetooth support and the BLE GATT
; skeleton. The actual GATT server implementation is still incomplete.
build_flags =
  -DROVER_PLATFORMIO_BUILD
  -DPIO_FRAMEWORK_ARDUINO_ENABLE_BLUETOOTH
  -DROVER_ENABLE_BLE_GATT
